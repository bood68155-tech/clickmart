<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-[Cairo]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [products, setProducts] = useState([
        { id: 1, name: "سماعات سوني", price: 349, image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=400" },
        { id: 2, name: "ساعة أبل", price: 799, image: "https://images.unsplash.com/photo-1434493789847-2f02dc6ca35d?w=400" }
      ]);
      const [cart, setCart] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [newP, setNewP] = useState({ name: '', price: '', image: '' });

      return (
        <div className="max-w-6xl mx-auto p-4">
          <header className="flex justify-between items-center py-6 border-b border-gray-800">
            <h1 className="text-3xl font-bold text-blue-500">ClickMart</h1>
            <div className="flex gap-4">
              <button onClick={() => setIsAdmin(!isAdmin)} className="text-gray-500 text-xs">إعدادات</button>
              <div className="bg-gray-800 px-4 py-2 rounded-full">🛒 السلة: {cart.length}</div>
            </div>
          </header>

          {isAdmin && (
            <div className="bg-gray-800 p-6 rounded-2xl my-8 border border-blue-600">
              <h2 className="text-xl mb-4 font-bold">لوحة تحكم المدير</h2>
              <form onSubmit={(e) => { e.preventDefault(); setProducts([...products, { ...newP, id: Date.now(), price: Number(newP.price) }]); setNewP({name:'', price:'', image:''}); }} className="flex gap-2">
                <input placeholder="الاسم" className="p-2 rounded bg-gray-700 w-full" value={newP.name} onChange={e=>setNewP({...newP, name:e.target.value})} />
                <input placeholder="السعر" className="p-2 rounded bg-gray-700 w-24" value={newP.price} onChange={e=>setNewP({...newP, price:e.target.value})} />
                <input placeholder="رابط الصورة" className="p-2 rounded bg-gray-700 w-full" value={newP.image} onChange={e=>setNewP({...newP, image:e.target.value})} />
                <button className="bg-blue-600 px-6 py-2 rounded font-bold">إضافة</button>
              </form>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6 py-10">
            {products.map(p => (
              <div key={p.id} className="bg-gray-800 p-4 rounded-2xl hover:border-blue-500 border border-transparent transition">
                <img src={p.image} className="w-full h-40 object-cover rounded-xl mb-4" />
                <h3 className="font-bold text-lg">{p.name}</h3>
                <p className="text-blue-400 font-bold mb-4">${p.price}</p>
                <button onClick={() => setCart([...cart, p])} className="w-full bg-blue-600 py-2 rounded-xl font-bold">أضف للسلة</button>
              </div>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
