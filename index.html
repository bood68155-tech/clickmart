<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كليك مارت (ClickMart) | شريكك الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at center, #1e1b4b 0%, #0a0a0a 70%, #000000 100%); color: white; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px); background-size: 550px 550px, 350px 350px; opacity: 0.3; pointer-events: none; }
        .gradient-text { background: linear-gradient(to right, #f97316, #fb923c); -webkit-background-clip: text; color: transparent; }
        .card-hover { transition: transform 0.3s ease; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover:hover { transform: translateY(-10px); border-color: #f97316; }
    </style>
</head>
<body>

    <div class="text-center pt-6 relative z-20">
        <button onclick="toggleLang()" class="bg-gray-800 text-white px-4 py-1 rounded-full text-xs hover:bg-orange-600 transition">Switch Language / تغيير اللغة</button>
    </div>

    <header class="py-12 text-center px-6 relative z-10">
        <h1 id="mainTitle" class="text-5xl md:text-6xl font-black mb-4 gradient-text">كليك مارت (ClickMart)</h1>
        <p id="mainDesc" class="text-gray-300 text-lg">شريكك الرقمي لبناء مستقبل مشروعك، نحول أفكارك إلى واقع ملموس.</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 mb-20 relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card-hover p-8 rounded-3xl">
                <h3 class="card1Title text-2xl font-bold mb-4">صفحة هبوط</h3>
                <div class="text-5xl font-black text-orange-500 mb-6">$20</div>
                <button onclick="openModal('صفحة هبوط')" class="order-btn w-full bg-orange-600 py-4 rounded-xl font-bold text-lg hover:bg-orange-500 transition">طلب الخدمة</button>
            </div>
            <div class="card-hover p-8 rounded-3xl border-orange-500 shadow-2xl shadow-orange-500/10">
                <h3 class="card2Title text-2xl font-bold mt-4 mb-4">متجر إلكتروني</h3>
                <div class="text-5xl font-black mb-6 text-white">$100</div>
                <button onclick="openModal('متجر إلكتروني')" class="order-btn w-full bg-white text-black py-4 rounded-xl font-bold text-lg hover:bg-orange-500 hover:text-white transition">طلب الخدمة</button>
            </div>
            <div class="card-hover p-8 rounded-3xl">
                <h3 class="card3Title text-2xl font-bold mb-4">موقع شخصي</h3>
                <div class="text-5xl font-black text-orange-500 mb-6">$50</div>
                <button onclick="openModal('موقع شخصي')" class="order-btn w-full bg-orange-600 py-4 rounded-xl font-bold text-lg hover:bg-orange-500 transition">طلب الخدمة</button>
            </div>
        </div>
    </section>

    <!-- Modal Window -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="card-hover p-8 rounded-3xl max-w-sm w-full border border-orange-500 shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4 text-orange-500">طلب خدمة</h2>
            <p id="modalMessage" class="text-gray-300 mb-6">شكراً لثقتك بـ كليك مارت. تواصل معنا عبر واتساب الآن لتزويدنا بتفاصيل مشروعك وبدء العمل!</p>
            <a id="waButton" href="#" target="_blank" class="block w-full bg-orange-600 py-3 rounded-full font-bold text-center hover:bg-orange-500 transition">تواصل عبر واتساب</a>
            <button type="button" onclick="closeModal()" id="closeBtn" class="w-full mt-4 text-gray-500 text-sm hover:text-white">إغلاق</button>
        </div>
    </div>

    <script>
        const langData = {
            'ar': { 
                title: 'كليك مارت (ClickMart)', desc: 'شريكك الرقمي لبناء مستقبل مشروعك، نحول أفكارك إلى واقع ملموس.', btn: 'طلب الخدمة', 
                card1: 'صفحة هبوط', card2: 'متجر إلكتروني', card3: 'موقع شخصي', 
                mTitle: 'طلب خدمة', mMsg: 'شكراً لثقتك بـ كليك مارت. تواصل معنا عبر واتساب الآن لتزويدنا بتفاصيل مشروعك وبدء العمل!', mBtn: 'تواصل عبر واتساب', mClose: 'إغلاق'
            },
            'en': { 
                title: 'ClickMart', desc: 'Your digital partner to build your project future.', btn: 'Order Service', 
                card1: 'Landing Page', card2: 'E-commerce Store', card3: 'Personal Site', 
                mTitle: 'Request Service', mMsg: 'Thank you for trusting ClickMart. Contact us via WhatsApp now to provide your project details and get started!', mBtn: 'Contact via WhatsApp', mClose: 'Close'
            }
        };

        let currentLang = 'ar';

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            // تحديث العناصر الرئيسية
            document.getElementById('mainTitle').innerText = langData[currentLang].title;
            document.getElementById('mainDesc').innerText = langData[currentLang].desc;
            document.querySelector('.card1Title').innerText = langData[currentLang].card1;
            document.querySelector('.card2Title').innerText = langData[currentLang].card2;
            document.querySelector('.card3Title').innerText = langData[currentLang].card3;
            document.querySelectorAll('.order-btn').forEach(btn => btn.innerText = langData[currentLang].btn);
            
            // تحديث نافذة المودال
            document.getElementById('modalTitle').innerText = langData[currentLang].mTitle;
            document.getElementById('modalMessage').innerText = langData[currentLang].mMsg;
            document.getElementById('waButton').innerText = langData[currentLang].mBtn;
            document.getElementById('closeBtn').innerText = langData[currentLang].mClose;
        }

        function openModal(s) { 
            document.getElementById('waButton').href = 'https://wa.me/970599608181?text=مرحباً، أريد طلب ' + s;
            document.getElementById('modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
