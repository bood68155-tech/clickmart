<!-- في قسم الـ CSS أضف هذا -->
<style>
  #admin-panel { display: none; padding: 2rem; background: var(--bg2); border: 1px solid var(--blue); border-radius: 20px; margin-bottom: 40px; }
</style>

<!-- في قسم الـ HTML، ضع هذا كود القسم (النموذج) -->
<div id="admin-panel">
  <h3>لوحة تحكم صاحب المتجر</h3>
  <form id="add-product-form" class="admin-form">
    <!-- نفس حقول الإدخال -->
    <input type="text" id="p-name" placeholder="اسم المنتج" class="admin-input" required />
    <input type="text" id="p-price" placeholder="السعر" class="admin-input" required />
    <input type="text" id="p-img" placeholder="رابط الصورة" class="admin-input" required />
    <button type="submit" class="admin-btn">عرض على المتجر</button>
  </form>
</div>

<!-- رابط مخفي في الفوتر لإظهار اللوحة -->
<a href="#" onclick="document.getElementById('admin-panel').style.display='block'; return false;" style="color: transparent;">.</a>
