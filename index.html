<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إضافة خلفية نجوم وتدرج فضائي */
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 50%, #020617 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-5xl font-bold mb-12 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">متجر كليك مارت (ClickMart)</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- بطاقات المنتجات بستايل فضائي -->
            <div class="glass p-6 rounded-3xl hover:scale-105 transition duration-500">
                <h2 class="text-2xl font-bold mb-2">متجر إلكتروني</h2>
                <p class="text-purple-300 text-3xl font-bold mb-4">$200</p>
                <button onclick="openModal('متجر إلكتروني')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-full font-bold shadow-lg shadow-blue-500/20">طلب الخدمة</button>
            </div>
            
            <div class="glass p-6 rounded-3xl hover:scale-105 transition duration-500">
                <h2 class="text-2xl font-bold mb-2">صفحة هبوط</h2>
                <p class="text-purple-300 text-3xl font-bold mb-4">$50</p>
                <button onclick="openModal('صفحة هبوط')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-full font-bold shadow-lg shadow-blue-500/20">طلب الخدمة</button>
            </div>

            <div class="glass p-6 rounded-3xl hover:scale-105 transition duration-500">
                <h2 class="text-2xl font-bold mb-2">برمجة خاصة</h2>
                <p class="text-purple-300 text-3xl font-bold mb-4">$300+</p>
                <button onclick="openModal('برمجة خاصة')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-full font-bold shadow-lg shadow-blue-500/20">طلب الخدمة</button>
            </div>
        </div>
    </div>

    <!-- النافذة التفاعلية بستايل زجاجي -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full border-blue-500/30">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4">طلب خدمة</h2>
            <form action="https://wa.me/970599608181" method="GET" target="_blank">
                <input type="hidden" name="text" id="waMessage">
                <select name="details" class="w-full p-3 bg-black/40 border border-white/10 rounded-xl mb-4 text-white">
                    <option>تصميم أساسي</option>
                    <option>تصميم + دومين</option>
                    <option>باقة متكاملة</option>
                </select>
                <button type="submit" class="w-full bg-blue-600 py-3 rounded-full font-bold shadow-lg shadow-blue-500/40">إرسال عبر واتساب</button>
                <button type="button" onclick="closeModal()" class="w-full mt-4 text-gray-400">إغلاق</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(service) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = 'طلب: ' + service;
            document.getElementById('waMessage').value = 'أريد طلب خدمة ' + service;
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
