<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-5xl font-bold mb-12 text-center text-blue-500">متجر كليك مارت (ClickMart)</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- منتج 1: تصميم المواقع -->
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 hover:border-blue-500 transition">
                <div class="h-48 bg-gray-700 rounded-xl mb-4 flex items-center justify-center">صورة الخدمة</div>
                <h2 class="text-2xl font-bold mb-2">تصميم متاجر إلكترونية</h2>
                <p class="text-gray-400 mb-4">متجر متكامل بلوحة تحكم احترافية.</p>
                <div class="flex gap-2 mb-4">
                    <span class="bg-green-900 text-green-300 px-2 py-1 rounded text-xs">Jawwal Pay</span>
                    <span class="bg-blue-900 text-blue-300 px-2 py-1 rounded text-xs">WhatsApp Pay</span>
                </div>
                <button class="w-full bg-blue-600 py-2 rounded-lg font-bold">طلب الخدمة</button>
            </div>

            <!-- منتج 2: صفحة هبوط -->
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 hover:border-blue-500 transition">

                <p class="text-gray-400 mb-4">صفحة احترافية لجذب العملاء وزيادة مبيعاتك.</p>
                <div class="h-8 mb-4"></div> <!-- مساحة فارغة للتنسيق -->
                <button class="w-full bg-blue-600 py-2 rounded-lg font-bold">طلب الخدمة</button>
            </div>

            <!-- منتج 3: باقة تطوير -->
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 hover:border-blue-500 transition">
                <div class="h-48 bg-gray-700 rounded-xl mb-4 flex items-center justify-center">صورة الخدمة</div>
                <h2 class="text-2xl font-bold mb-2">تطوير المواقع</h2>
                <p class="text-gray-400 mb-4">برمجة خاصة لموقعك الخاص أو شركتك.</p>
                <div class="h-8 mb-4"></div>
                <button class="w-full bg-blue-600 py-2 rounded-lg font-bold">طلب الخدمة</button>
            </div>

        </div>

        <div class="mt-16 text-center">
            <a href="https://wa.me/970599608181" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-12 rounded-full text-xl transition">
                تواصل معنا عبر واتساب
            </a>
        </div>
    </div>

</body>
</html>
